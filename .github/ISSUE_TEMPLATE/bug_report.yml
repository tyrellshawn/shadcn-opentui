name: Bug Report
description: File a bug report to help us improve
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible to help us reproduce and fix the issue.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what you see!
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduction-steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: input
    id: framework-version
    attributes:
      label: Framework/Library Version
      description: What version of React and Next.js are you running?
      placeholder: "React 19.0.0, Next.js 15.2.8"
    validations:
      required: true

  - type: input
    id: shadcn-opentui-version
    attributes:
      label: shadcn-opentui Version
      description: What version of shadcn-opentui are you using?
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: What browser are you seeing the problem on?
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Other
    validations:
      required: true

  - type: input
    id: browser-version
    attributes:
      label: Browser Version
      description: What version of the browser?
      placeholder: "Chrome 120.0.0.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: What operating system are you running?
      options:
        - Windows
        - macOS
        - Linux
        - iOS
        - Android
        - Other
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Node.js Version
      description: What version of Node.js are you using?
      placeholder: "v20.11.0"
    validations:
      required: true

  - type: dropdown
    id: package-manager
    attributes:
      label: Package Manager
      description: Which package manager are you using?
      options:
        - bun
        - npm
        - yarn
        - pnpm
    validations:
      required: true

  - type: textarea
    id: minimal-reproduction
    attributes:
      label: Minimal reproduction
      description: |
        Please provide a minimal code example that reproduces the issue. You can use:
        - CodeSandbox
        - StackBlitz  
        - GitHub repository
        - Code snippet
      placeholder: |
        ```tsx
        import { Terminal } from "@/components/ui/terminal"
        
        export default function App() {
          return <Terminal title="Bug Example" />
        }
        ```
    validations:
      required: true

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here, such as screenshots, error messages, or console logs.
      placeholder: Any additional information that might help us understand the issue better.

  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: By submitting this issue, you agree to follow our [Code of Conduct](https://github.com/tyrellshawn/shadcn-opentui/blob/main/CONTRIBUTING.md)
      options:
        - label: I agree to follow this project's Code of Conduct
          required: true